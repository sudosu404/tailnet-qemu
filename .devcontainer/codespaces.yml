services:
  qemu:
    image: ghcr.io/sudosu404/tailnet-qemu:latest
    container_name: tailnet-qemu
    environment:
      ALLOCATE: "Y"
      RAM_SIZE: "half"
      DISK_SIZE: "max"
      CPU_CORES: "max"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
    volumes:
      - ./storage:/storage
    restart: on-failure
    stop_grace_period: 2m
